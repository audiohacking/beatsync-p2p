name: Deploy beatsync-p2p to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static site
        working-directory: apps/client
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_P2P_MODE: "1"
          NEXT_PUBLIC_STATIC_EXPORT: "1"
          NEXT_OUTPUT: export
          NEXT_PUBLIC_BASE_PATH: /beatsync-p2p
        run: bun run build:pages

      - name: Prepare SPA fallback for GitHub Pages
        working-directory: apps/client
        run: bun run pages:404

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/client/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
